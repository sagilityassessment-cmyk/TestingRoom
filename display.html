<!DOCTYPE html>
<html>
<head>
<title>Display</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfL06VVQ2mjlulca4AJgzRPsGpXO0uWCQ",
  authDomain: "testingroom-6aee1.firebaseapp.com",
  projectId: "testingroom-6aee1",
  storageBucket: "testingroom-6aee1.appspot.com",
  messagingSenderId: "526946321141",
  appId: "1:526946321141:web:aa78726ade63189f7bbbc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const loc = urlParams.get('loc').toUpperCase();

let audioEnabled = false;
let lastCall = "";
let popupActive = false;

window.enableAudio = () => {
  audioEnabled = true;
  alert("Audio Enabled ✅");
};

function speak(text){
  if(!audioEnabled) return;

  const msg = new SpeechSynthesisUtterance(
    text + ", Please proceed to testing room"
  );
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

window.onload = ()=>{
  const ref = doc(db,"seats",loc.toLowerCase());

  onSnapshot(ref,(snap)=>{
    const data = snap.data();

    // ✅ SHOW POPUP ON NEW CALL
    if(data.lastCall && data.lastCall !== lastCall){
      lastCall = data.lastCall;
      showPopup(data.lastCall);
      return;
    }

    // ✅ NORMAL GRID VIEW
    if(!popupActive){
      showGrid(data);
    }
  });
};

// ✅ POPUP VIEW
function showPopup(text){
  popupActive = true;

  document.getElementById("main").innerHTML = `
    <div style="background:#2d1b69;color:white;padding:15px;text-align:center;">
      <span style="background:#6bc7b0;color:black;padding:5px 12px;border-radius:20px;font-size:14px;">
        ${loc}
      </span>
      <span style="font-size:22px;margin-left:10px;">
        PLEASE PROCEED TO TESTING ROOM
      </span>
    </div>

    <div style="background:#f5f5f5;color:#2d1b69;text-align:center;padding:120px;">
      <h1 style="font-size:90px;margin:0;">
        ${text.toUpperCase()}
      </h1>
      <p style="font-size:28px;">
        Please proceed to the testing room
      </p>
    </div>
  `;

  speak(text);

  // ✅ RETURN TO GRID AFTER 5 SECONDS
  setTimeout(()=>{
    popupActive = false;
  },5000);
}

// ✅ GRID VIEW (MATCH YOUR TABLE DESIGN)
function showGrid(data){

  let html = `
    <div style="background:#2d1b69;color:white;padding:15px;text-align:center;">
      <span style="background:#6bc7b0;color:black;padding:5px 12px;border-radius:20px;font-size:14px;">
        ${loc}
      </span>
      <span style="font-size:22px;margin-left:10px;">
        PLEASE PROCEED TO TESTING ROOM
      </span>
    </div>

    <div style="
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      padding:20px;
    ">
  `;

  for(let i=1;i<=20;i++){

    let bgColor = (i % 2 === 0) ? "#d5e3e3" : "#e8c6c6"; // ✅ alternating color

    html += `
      <div style="background:${bgColor};padding:20px;text-align:center;color:#2d1b69;">
        <div style="font-weight:bold;">SEAT ${i}</div>
        <h1 style="margin:10px 0;">${data["seat"+i]||0}</h1>
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("main").innerHTML = html;
}

</script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:black;
}

button{
  position:fixed;
  right:10px;
  top:10px;
  padding:10px;
}
</style>

</head>

<body>

<button onclick="enableAudio()">START DISPLAY</button>

<div id="main"></div>

</body>
</html>
