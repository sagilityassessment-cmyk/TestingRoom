<!DOCTYPE html>
<html>
<head>
<title>Display</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfL06VVQ2mjlulca4AJgzRPsGpXO0uWCQ",
  authDomain: "testingroom-6aee1.firebaseapp.com",
  projectId: "testingroom-6aee1",
  storageBucket: "testingroom-6aee1.appspot.com",
  messagingSenderId: "526946321141",
  appId: "1:526946321141:web:aa78726ade63189f7bbbc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const loc = urlParams.get('loc').toLowerCase();

let audioEnabled = false;
let lastCall = "";
let popupActive = false;

window.enableAudio = () => {
  audioEnabled = true;
  alert("Audio Enabled ✅");
};

function speak(text){
  if(!audioEnabled) return;

  const msg = new SpeechSynthesisUtterance(
    text + ", Please proceed to testing room"
  );
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

// ✅ SINGLE LISTENER (IMPORTANT)
window.onload = ()=>{
  const ref = doc(db,"seats",loc);

  onSnapshot(ref,(snap)=>{
    const data = snap.data();

    // ✅ NEW CALL DETECTION
    if(data.lastCall && data.lastCall !== lastCall){
      lastCall = data.lastCall;
      showPopup(data.lastCall);
      return;
    }

    // ✅ NORMAL GRID
    if(!popupActive){
      showGrid(data);
    }
  });
};

// ✅ POPUP DESIGN (MATCH YOUR IMAGE)
function showPopup(text){
  popupActive = true;

  const main = document.getElementById("main");

  main.innerHTML = `
    <div style="background:#2d1b69;color:white;padding:15px;text-align:center;">
      <span style="background:#6bc7b0;color:black;padding:5px 10px;border-radius:20px;font-size:14px;">
        ${loc.toUpperCase()}
      </span>
      <h2 style="display:inline;margin-left:10px;">
        PLEASE PROCEED TO TESTING ROOM
      </h2>
    </div>

    <div style="background:#f5f5f5;color:#2d1b69;text-align:center;padding:120px;">
      <h1 style="font-size:90px;margin:0;">
        ${text.toUpperCase()}
      </h1>
      <p style="font-size:28px;">
        Please proceed to the testing room
      </p>
    </div>
  `;

  speak(text);

  // ✅ RETURN TO GRID
  setTimeout(()=>{
    popupActive = false;
  },5000);
}

// ✅ GRID VIEW (MATCH YOUR FIRST IMAGE)
function showGrid(data){

  let html = `
    <h1 style="text-align:center;">
      PLEASE PROCEED TO TESTING ROOM
    </h1>

    <div style="
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:40px;
      padding:40px;
      text-align:center;
    ">
  `;

  for(let i=1;i<=20;i++){
    html += `
      <div>
        <div>Seat ${i}</div>
        <h1>${data["seat"+i]||0}</h1>
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("main").innerHTML = html;
}

</script>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family: Arial;
}

button{
  position:absolute;
  top:10px;
  right:10px;
  padding:10px;
}
</style>

</head>

<body>

<button onclick="enableAudio()">START DISPLAY</button>

<div id="main"></div>

</body>
</html>
