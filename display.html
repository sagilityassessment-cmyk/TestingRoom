// ✅ MODIFY SPEAK
function speak(text){
  if(!audioEnabled) return;

  const msg = new SpeechSynthesisUtterance(
    text + ", Please proceed to Testing Room"
  );
  speechSynthesis.speak(msg);
}

window.onload = ()=>{
  const ref = doc(db,"seats",loc);

  onSnapshot(ref,(docSnap)=>{
    const data = docSnap.data();
    const grid = document.getElementById("grid");
    grid.innerHTML="";

    for(let i=1;i<=20;i++){
      grid.innerHTML += `
      <div>
        <h3>Seat ${i}</h3>
        <h1>${data["seat"+i]||0}</h1>
      </div>`;
    }

    if(data.lastCall){
      speak(data.lastCall);
    }
  });
}
