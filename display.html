<!DOCTYPE html>
<html>
<head>
<title>Display</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfL06VVQ2mjlulca4AJgzRPsGpXO0uWCQ",
  authDomain: "testingroom-6aee1.firebaseapp.com",
  projectId: "testingroom-6aee1",
  storageBucket: "testingroom-6aee1.appspot.com",
  messagingSenderId: "526946321141",
  appId: "1:526946321141:web:aa78726ade63189f7bbbc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const loc = urlParams.get('loc').toUpperCase();

// ✅ audio control
let audioEnabled = false;
let showingPopup = false;

window.enableAudio = () => {
  audioEnabled = true;
  alert("Audio Enabled ✅");
};

function speak(text){
  if(!audioEnabled) return;

  const msg = new SpeechSynthesisUtterance(
    text + ", Please proceed to testing room"
  );
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

window.onload = ()=>{
  const ref = doc(db,"seats",loc.toLowerCase());

  onSnapshot(ref,(docSnap)=>{
    const data = docSnap.data();

    // ✅ ONLY trigger popup when NOT already showing
    if(data.lastCall && !showingPopup){
      showPopup(data.lastCall);
      speak(data.lastCall);
    }
  });
}

// ✅ POPUP FUNCTION (BIG SCREEN)
function showPopup(text){
  showingPopup = true;

  const main = document.getElementById("main");

  main.innerHTML = `
    <div style="background:#2d1b69;color:white;padding:20px;">
      <h2>${loc} PLEASE PROCEED TO TESTING ROOM</h2>
    </div>

    <div style="background:white;color:#2d1b69;padding:80px;text-align:center;">
      <h1 style="font-size:80px;margin:0;">${text.toUpperCase()}</h1>
      <p style="font-size:30px;">Please proceed to the testing room</p>
    </div>
  `;

  // ✅ WAIT 5 SECONDS THEN RETURN
  setTimeout(()=>{
    loadGrid();
    showingPopup = false;
  },5000);
}

// ✅ LOAD GRID NORMAL VIEW
function loadGrid(){
  const ref = doc(db,"seats",loc.toLowerCase());

  onSnapshot(ref,(docSnap)=>{
    const data = docSnap.data();

    let html = `
      <div style="background:#2d1b69;color:white;padding:20px;">
        <h2>${loc} PLEASE PROCEED TO TESTING ROOM</h2>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);text-align:center;">
    `;

    for(let i=1;i<=20;i++){
      html += `
      <div style="border:1px solid #ccc;padding:20px;">
        <h3>SEAT ${i}</h3>
        <h1>${data["seat"+i]||0}</h1>
      </div>`;
    }

    html += `</div>`;

    document.getElementById("main").innerHTML = html;
  });
}

// ✅ LOAD GRID FIRST TIME
window.addEventListener("load", loadGrid);

</script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:black;
}
button {
  position:fixed;
  top:10px;
  right:10px;
  padding:10px;
}
</style>

</head>

<body>

<button onclick="enableAudio()">START DISPLAY</button>

<div id="main"></div>

</body>
</html>
``
