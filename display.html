<!DOCTYPE html>
<html>
<head>
<title>Display</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfL06VVQ2mjlulca4AJgzRPsGpXO0uWCQ",
  authDomain: "testingroom-6aee1.firebaseapp.com",
  projectId: "testingroom-6aee1",
  storageBucket: "testingroom-6aee1.appspot.com",
  messagingSenderId: "526946321141",
  appId: "1:526946321141:web:aa78726ade63189f7bbbc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const loc = urlParams.get('loc').toLowerCase();

// ✅ AUDIO CONTROL
let audioEnabled = false;
window.enableAudio = () => {
  audioEnabled = true;
  alert("Audio Enabled ✅");
};

function speak(text){
  if(!audioEnabled) return;

  const msg = new SpeechSynthesisUtterance(
    text + ", Please proceed to testing room"
  );
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

// ✅ VARIABLES
let lastCallShown = "";   // track last shown popup
let isPopup = false;

window.onload = ()=>{
  const ref = doc(db,"seats",loc);

  onSnapshot(ref,(docSnap)=>{
    const data = docSnap.data();

    // ✅ CHECK IF NEW CALL
    if(data.lastCall && data.lastCall !== lastCallShown){
      lastCallShown = data.lastCall;

      showPopup(data);
      return; // ✅ stop grid rendering
    }

    // ✅ only show grid if no popup
    if(!isPopup){
      showGrid(data);
    }
  });
};

// ✅ SHOW POPUP
function showPopup(data){
  isPopup = true;

  const text = data.lastCall;

  const main = document.getElementById("main");

  main.innerHTML = `
    <div style="background:#2d1b69;color:white;padding:20px;">
      <h2>PLEASE PROCEED TO TESTING ROOM</h2>
    </div>

    <div style="background:white;color:#2d1b69;padding:100px;text-align:center;">
      <h1 style="font-size:90px;margin:0;">${text.toUpperCase()}</h1>
      <p style="font-size:30px;">Please proceed to the testing room</p>
    </div>
  `;

  speak(text);

  // ✅ RETURN TO GRID AFTER 5s
  setTimeout(()=>{
    isPopup = false;
    const ref = doc(db,"seats",loc);
    onSnapshot(ref,(docSnap)=>{
      showGrid(docSnap.data());
    });
  },5000);
}

// ✅ GRID VIEW
function showGrid(data){

  let html = `
    <div style="background:#2d1b69;color:white;padding:20px;">
      <h2>PLEASE PROCEED TO TESTING ROOM</h2>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);text-align:center;">
  `;

  for(let i=1;i<=20;i++){
    html += `
      <div style="padding:20px;">
        <h3>Seat ${i}</h3>
        <h1>${data["seat"+i]||0}</h1>
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("main").innerHTML = html;
}

</script>

  margin:0;
  font-family: Arial;
