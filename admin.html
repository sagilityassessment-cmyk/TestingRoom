<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBf...",
  authDomain: "testingroom-6aee1.firebaseapp.com",
  projectId: "testingroom-6aee1",
  storageBucket: "testingroom-6aee1.appspot.com",
  messagingSenderId: "526946321141",
  appId: "1:526946321141:web:aa78726ade63189f7bbbc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const loc = urlParams.get('loc').toLowerCase();

window.onload = async ()=>{
  const grid = document.getElementById("grid");

  for(let i=1;i<=20;i++){
    grid.innerHTML += `
    <div>
      <h3>Seat ${i}</h3>
      <input id="seat${i}">
      <button onclick="callSeat(${i})">CALL</button>
    </div>`;
  }
}

window.callSeat = async(seat)=>{
  const value = document.getElementById("seat"+seat).value;

  const ref = doc(db,"seats",loc);
  await updateDoc(ref, {
    ["seat"+seat]: Number(value),
    lastCall: "Seat " + seat + " - ID " + value
  });

  alert("Called Seat " + seat);
}

</script>
</head>

<body>
<h2>ADMIN PANEL</h2>
<div id="grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;"></div>
</body>
</html>
